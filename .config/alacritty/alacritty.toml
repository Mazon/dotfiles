[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "0x928374"
blue = "0x83a598"
cyan = "0x8ec07c"
green = "0xb8bb26"
magenta = "0xd3869b"
red = "0xfb4934"
#white = "0xebdbb2"
yellow = "0xfabd2f"

[colors.cursor]
cursor = "CellForeground"
text = "CellBackground"

[colors.normal]
black = "0x282828"
blue = "0x458588"
cyan = "0x689d6a"
green = "0x98971a"
magenta = "0xb16286"
red = "0xcc241d"
#white = "0xa89984"
yellow = "0xd79921"

[colors.primary]
background = "0x080808"
foreground = "0xfbf1c7"

[colors.selection]
background = "0xdc3232"
text = "0xffffff"
#white = "0xffffff"

[cursor.style]
blinking = "off"
shape = "Beam"

[font]
size = 16

[font.bold]
family = "Hack Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Hack Nerd Font Mono"
style = "Italic"

[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[scrolling]
history = 10000
multiplier = 3

[window]
decorations = "full"
opacity = 0.8
dynamic_title = true
blur = true
startup_mode = "Windowed"

[window.dimensions]
columns = 140
lines = 36

[window.padding]
x = 25
y = 25


#[terminal]
#shell = { program = "/bin/zsh", args = ["-l"] }
