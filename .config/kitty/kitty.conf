#######################################################################
# Kitty Terminal Configuration — Beautiful & Functional
#######################################################################

# ─── Theme: Catppuccin Mocha (embedded) ────────────────────────────
background              #1e1e2e
foreground              #cdd6f4
selection_background    #585b70
selection_foreground    #cdd6f4
url_color               #89b4fa
color0                  #45475a
color1                  #f38ba8
color2                  #a6e3a1
color3                  #f9e2af
color4                  #89b4fa
color5                  #f5c2e7
color6                  #94e2d5
color7                  #bac2de
color8                  #585b70
color9                  #f38ba8
color10                 #a6e3a1
color11                 #f9e2af
color12                 #89b4fa
color13                 #f5c2e7
color14                 #94e2d5
color15                 #bac2de
color16                 #f2cdcd
color17                 #f5e0dc

# ─── Font ──────────────────────────────────────────────────────────
font                        Iosevka Nerd Font
bold_font                   auto
italic_font                 auto
bold_italic_font            auto
font_size                   16.0
enable_ligatures            1

# ─── Window & Layout ──────────────────────────────────────────────
window_padding_width        10
window_border_width         1
window_border_top_separator     "┈"
window_border_bottom_separator  "┈"
window_border_left_separator    "│"
window_border_right_separator   "│"

remember_window_size        yes
initial_window_width        960
initial_window_height       680

# Single window mode — hide borders/tabs when only one window
single_window_mode          no

# ─── Tab Bar ──────────────────────────────────────────────────────
tab_bar_style              powerline
tab_bar_powerline_style    slant
active_tab_font_style      bold
tab_powerline_left_symbol  
tab_powerline_right_symbol 

# Show only the active tab's text
active_tab_foreground      #1e1e2e
active_tab_background      #cdd6f4
inactive_tab_foreground    #cdd6f4
inactive_tab_background    #313244

tab_bar_margin            6
tab_bar_margin_color      #1e1e2e

# ─── Cursor ───────────────────────────────────────────────────────
cursor_shape               beam
cursor_beam_thickness      2
cursor_underline_thickness 2
cursor_text_color          #1e1e2e
cursor_color               #f5e0dc
cursor_blink_interval      1.0

# ─── Scrollback ───────────────────────────────────────────────────
scrollback_pager          ty
scrollback_pager_font     Iosevka Nerd Font
scrollback_pager_font_size 12.0
scrollback_lines          10000
scrollback_fuzz_amount    1

# ─── Clipboard ────────────────────────────────────────────────────
enable_audio_bell         no
allow_remote_control      yes
listen_on                 unix:/tmp/kitty
clipboard_control         write-clipboard,write-primary

# ─── Keyboard Shortcuts ───────────────────────────────────────────
# Split windows
map ctrl+shift+left   split_horizontal
map ctrl+shift+right  split_vertical
map ctrl+shift+c      copy_to_clipboard
map ctrl+shift+v      paste_from_clipboard
map ctrl+shift+n      new_os_window

# Navigation between splits
map ctrl+left  next_layout
map ctrl+right prev_layout

# Resize splits
map ctrl+shift+h  resize_split left
map ctrl+shift+l  resize_split right
map ctrl+shift+k  resize_split up
map ctrl+shift+j  resize_split down

# Quick resize amount
resize_increments         4

# ─── Mouse ────────────────────────────────────────────────────────
mouse_hide_wait           3.0
click_match_punctuation   yes

# ─── Performance ──────────────────────────────────────────────────
sync_to_monitor           no
background_opacity        0.92
dim_foreground            no

# ─── Open links with ctrl+click ───────────────────────────────────
ctrl_as_meta              no

# ─── Bell ─────────────────────────────────────────────────────────
visual_bell_duration      0.3
