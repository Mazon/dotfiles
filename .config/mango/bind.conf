# System
bind=ALT+CTRL,r,reload_config
binds=ALT+CTRL,q,killclient
binds=ALT+CTRL,l,spawn,swaylock -f -c 000000
# Removed: screenshot.sh (grim+slurp). Flameshot handles screenshots.
binds=ALT+CTRL,Escape,spawn,mmsg -q

binds=Alt,space,spawn,fuzzel --anchor top

# Windows
binds=ALT,h,focusdir,left
binds=ALT,l,focusdir,right
binds=ALT,k,focusdir,up
binds=ALT,j,focusdir,down

# Gaps
binds=ALT+SHIFT,X,incgaps,1
binds=ALT+SHIFT,Z,incgaps,-1
binds=ALT+SHIFT,R,togglegaps

# swap window
#binds=ALT+CTRL,k,exchange_client,up
#binds=ALT+CTRL,j,exchange_client,down
#binds=ALT+CTRL,h,exchange_client,left
#binds=ALT+CTRL,l,exchange_client,right
binds=ALT+SHIFT,S,zoom # switch master

# resizewin
binds=ALT+SHIFT,K,resizewin,+0,-50
binds=ALT+SHIFT,J,resizewin,+0,+50
binds=ALT+SHIFT,H,resizewin,-50,+0
binds=ALT+SHIFT,L,resizewin,+50,+0


# Layout
#binds=ALT,e,set_proportion,1.0
#binds=ALT,x,switch_proportion_preset,
binds=ALT+SHIFT,I,incnmaster,1
binds=ALT+SHIFT,D,incnmaster,-1
binds=ALT+SHIFT,T,setlayout,tile
binds=ALT+SHIFT,E,setlayout,right_tile
binds=ALT+SHIFT,C,setlayout,scroller
binds=ALT+SHIFT,N,switch_layout
binds=ALT+SHIFT,backslash,togglefloating
binds=ALT+SHIFT,A,togglemaximizescreen
binds=ALT+SHIFT,F,togglefullscreen
#binds=ALT+SHIFT,M,minimized,
#binds=ALT+SHIFT,U,restore_minimized

# View tag
binds=ALT,1,view,1,0
binds=ALT,2,view,2,0
binds=ALT,3,view,3,0
binds=ALT,4,view,4,0
binds=ALT,5,view,5,0
binds=ALT,6,view,6,0
binds=ALT,7,view,7,0
binds=ALT,8,view,8,0
binds=ALT,9,view,9,0

# Move to Tag
bind=ALT+SHIFT+CTRL,1,tagsilent,1,0
bind=ALT+SHIFT+CTRL,2,tagsilent,2,0
bind=ALT+SHIFT+CTRL,3,tagsilent,3,0
bind=ALT+SHIFT+CTRL,4,tagsilent,4,0
bind=ALT+SHIFT+CTRL,5,tagsilent,5,0
bind=ALT+SHIFT+CTRL,6,tagsilent,6,0
bind=ALT+SHIFT+CTRL,7,tagsilent,7,0
bind=ALT+SHIFT+CTRL,8,tagsilent,8,0
bind=ALT+SHIFT+CTRL,9,tagsilent,9,0

# Attach/Detach window to tag
binds=ALT+CTRL,1,toggletag,1
binds=ALT+CTRL,2,toggletag,2
binds=ALT+CTRL,3,toggletag,3
binds=ALT+CTRL,4,toggletag,4
binds=ALT+CTRL,5,toggletag,5
binds=ALT+CTRL,6,toggletag,6
binds=ALT+CTRL,7,toggletag,7
binds=ALT+CTRL,8,toggletag,8
binds=ALT+CTRL,9,toggletag,9

# Toggle tag in view
bind=ALT+SHIFT,1,toggleview,1
bind=ALT+SHIFT,2,toggleview,2
bind=ALT+SHIFT,3,toggleview,3
bind=ALT+SHIFT,4,toggleview,4
bind=ALT+SHIFT,5,toggleview,5
bind=ALT+SHIFT,6,toggleview,6
bind=ALT+SHIFT,7,toggleview,7
bind=ALT+SHIFT,8,toggleview,8
bind=ALT+SHIFT,9,toggleview,9

# brightness and volume
binds=none,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/volume.sh up
binds=none,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/volume.sh down
binds=none,XF86AudioMute,spawn,~/.config/mango/scripts/volume.sh mute
binds=none,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binds=none,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
binds=none,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down

# media
binds=none,XF86AudioPlay,spawn,playerctl play-pause
binds=none,XF86AudioNext,spawn,playerctl next
binds=none,XF86AudioPrev,spawn,playerctl previous

# Screenshots
binds=SHIFT+HOME,Home,spawn,flameshot gui
