# MangoWM environment
# CLEANED UP: a previous setup tuned this for a 4K panel, which over-scaled
# your 1440p screen and made LibreWolf fonts blurry.
#
#   REMOVED: env=GDK_SCALE,2            (forced 2x -> over-scaled & blurry)
#   REMOVED: env=QT_WAYLAND_FORCE_DPI,192 (4K DPI -> Qt apps over-scaled)
#   ADDED:   env=MOZ_ENABLE_WAYLAND,1   (LibreWolf/Firefox run native Wayland -> sharp text)
#
# The other vars below were preserved from your previous (working) setup
# (input method, cursor, Qt theme). Without this file they'd be lost on re-login.

env=XCURSOR_SIZE,24
env=XCURSOR_THEME,Bibata-Modern-Ice
env=GTK_IM_MODULE,fcitx
env=QT_IM_MODULE,fcitx
env=SDL_IM_MODULE,fcitx
env=XMODIFIERS,@im=fcitx
env=GLFW_IM_MODULE,fcitx
env=QT_QPA_PLATFORMTHEME,qt5ct
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=QT_QPA_PLATFORM,wayland;xcb
env=MOZ_ENABLE_WAYLAND,1
