format = """\
[ŅéČ](fg:#2C2B3C)\
$username\
[Ņé┤](fg:#2C2B3C bg:#313041)\
$directory\
[Ņé┤](fg:#313041 bg:#353446)\
$git_branch\
$git_status\
[Ņé┤](fg:#353446 bg:#3E3D4F)\
$all\
$cmd_duration\
$jobs\
$battery\
$time\
$character"""
# [Ņé┤](fg:#3E3D4F bg:#333a56)\

# Disable the blank line at the start of the prompt
add_newline = true

[line_break]
disabled = true

# You can also replace your username with a neat symbol like  to save some space
[username]
show_always = true
style_user = "fg:#CAA9E0 bg:#2C2B3C"
style_root = "fg:#CAA9E0 bg:#2C2B3C"
format = '[ ]($style)' # $user

[directory]
style = "fg:#91B1F0 bg:#313041"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"~" = " ~"
"Documents" = "¾░łÖ "
"Downloads" = " "
"Music" = "¾░ØÜ "
"Pictures" = " "
"Videos" = " "

[git_branch]
symbol = "’Éś"
style = "fg:#a6e3a1 bg:#353446"
format = '[ $symbol $branch(:$remote_branch) ]($style)'

[git_status]
style = "fg:#a6e3a1 bg:#353446"
ahead = "ŌćĪ${count}"
diverged = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}"
behind = "ŌćŻ${count}"
deleted = "x"
format = '[$all_status$ahead_behind ]($style)'


