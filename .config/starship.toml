format = """\
[оӮ¶](fg:#2C2B3C)\
$username\
[оӮҙ](fg:#2C2B3C bg:#313041)\
$directory\
[оӮҙ](fg:#313041 bg:#353446)\
$git_branch\
$git_status\
[оӮҙ](fg:#353446 bg:#3E3D4F)\
$all\
$cmd_duration\
$jobs\
$battery\
$time\
$character"""
# [оӮҙ](fg:#3E3D4F bg:#333a56)\

# Disable the blank line at the start of the prompt
add_newline = true

[line_break]
disabled = true

# You can also replace your username with a neat symbol like п„  to save some space
[username]
show_always = true
style_user = "fg:#CAA9E0 bg:#2C2B3C"
style_root = "fg:#CAA9E0 bg:#2C2B3C"
format = '[оҠҶ ]($style)' # $user

[directory]
style = "fg:#91B1F0 bg:#313041"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"~" = "пҖ• ~"
"Documents" = "пңҳ "
"Downloads" = "пҖҷ "
"Music" = "рҹҺң "
"Pictures" = "п‘Ҷ "
"Videos" = "пҖҪ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

[git_branch]
symbol = "пҗҳ"
style = "fg:#a6e3a1 bg:#353446"
format = '[ $symbol $branch(:$remote_branch) ]($style)'

[git_status]
style = "fg:#a6e3a1 bg:#353446"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
deleted = "x"
format = '[$all_status$ahead_behind ]($style)'


