# ── Starship Prompt — Catppuccin Mocha ──────────────────────────────────────

format = """
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$cmd_duration\
$jobs\
$time\
$line_break\
$character"""

right_format = """$python$nodejs$rust$golang$lua$clang"""

[fill]
symbol = " "

# ── Prompt character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

# ── Directory ────────────────────────────────────────────────────────────────
[directory]
style = "bold sapphire"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo  = true
read_only         = " 󰌾"
read_only_style   = "red"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Projects"  = "󰲋 "

# ── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
symbol  = " "
style   = "bold mauve"
format  = "[$symbol$branch]($style) "

[git_status]
style   = "bold text"
format  = '([$all_status$ahead_behind]($style) )'
conflicted = " ${count} "
ahead      = " ${count} "
behind     = " ${count} "
diverged   = " ${ahead_count}  ${behind_count} "
untracked  = " ${count} "
stashed    = " ${count} "
modified   = " ${count} "
staged     = " ${count} "
renamed    = " ${count} "
deleted    = " ${count} "

[git_metrics]
disabled = false
added_style   = "bold green"
deleted_style = "bold red"
format        = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

# ── Cmd duration ─────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000
style    = "yellow"
format   = "[$duration]($style)"
show_milliseconds = false

# ── Jobs ─────────────────────────────────────────────────────────────────────
[jobs]
symbol  = "✦"
style   = "bold blue"
format  = "[$symbol$number]($style) "

# ── Time ─────────────────────────────────────────────────────────────────────
[time]
disabled    = false
style       = "overlay0"
format      = "[$time]($style)"
time_format = "%H:%M"

# ── Languages (right prompt) ─────────────────────────────────────────────────
[python]
symbol  = " "
style   = "yellow"
format  = "[$symbol($version)]($style) "

[nodejs]
symbol  = " "
style   = "green"
format  = "[$symbol($version)]($style) "

[rust]
symbol  = "󱘗 "
style   = "peach"
format  = "[$symbol($version)]($style) "

[golang]
symbol  = " "
style   = "sky"
format  = "[$symbol($version)]($style) "

[lua]
symbol  = " "
style   = "blue"
format  = "[$symbol($version)]($style) "

[clang]
symbol  = "⚙ "
style   = "surface2"
format  = "[$symbol($version)]($style) "

# ── Palette — Catppuccin Mocha ───────────────────────────────────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
