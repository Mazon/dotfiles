# True Color
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"

set -g mouse on                  # On for now until i get used to keybindings
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style

# Leader key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Windows
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Resize panes with repeatable vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Copy mode with vim keys
bind Escape copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Plugins 
set -sg escape-time 1
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Statusbar
# Start window and pane indices at 1.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Panes
# Set active pane border color
set-option -g pane-active-border-style fg=colour109

# Set inactive pane border color
set-option -g pane-border-style fg=colour237

# Pane number display
set-option -g display-panes-active-colour colour1 #fg2
set-option -g display-panes-colour colour237 #bg1

# Status Left
set -g status-left-length 85
set -g status-left ""

set -g status-style bg=default
set -g status-justify centre

set-window-option -g window-status-current-format "\
#[fg=colour147][#I]\
#[fg=colour189] #W"

set-window-option -g window-status-format "\
#[fg=colour246][#I]\
#[fg=colour246] #W"

# Subtle separator between windows
set-window-option -g window-status-separator " #[fg=colour239]│#[fg=default] "

# Status Right
set -g status-right-length 85
set -g status-right '#(gitmux "#{pane_current_path}") #[fg=colour246]%H:%M %Y-%m-%d' 

# Message/command styling
set -g message-style fg=colour189,bg=colour235
set -g message-command-style fg=colour189,bg=colour235

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
